name: GitHub 3D Grid Generator

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# Explicitly grant the runner permission to write changes back to the repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Generate 3D Calendar Grid
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: siddharthakuchana
          
      - name: Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib/
          git commit -m "Update native 3D contribution grid" || exit 0
          git push
